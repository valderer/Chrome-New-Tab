<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New Tab</title>
    <link rel="icon" href="icon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="styles.css">
    <script src="three.min.js"></script>
    <script src="bg-3d.js" defer></script>
    <script src="theme-init.js"></script>
</head>
<body>
    <!-- 动态 3D 背景 -->
    <canvas id="bgCanvas"></canvas>

    <!-- 右下角悬浮设置面板 -->
    <div class="settings-wrapper">
        <div class="settings-panel" id="settingsPanel">
            <h4 class="settings-title">外观设置</h4>
            
            <!-- 编辑模式 -->
            <div class="setting-group">
                <label>修改模式 (长按拖动排序/点击编辑/删除)</label>
                <div class="toggle-options">
                    <div class="toggle-btn edit-btn selected" data-edit="off">关闭</div>
                    <div class="toggle-btn edit-btn" data-edit="on">开启</div>
                </div>
            </div>

            <!-- 深浅模式选择 -->
            <div class="setting-group">
                <label>外观模式</label>
                <div class="toggle-options">
                    <div class="toggle-btn mode-btn" data-mode="light">浅色</div>
                    <div class="toggle-btn mode-btn" data-mode="dark">深色</div>
                    <div class="toggle-btn mode-btn" data-mode="auto">跟随系统</div>
                </div>
            </div>

            <!-- 主题色选择 -->
            <div class="setting-group">
                <label>流光配色</label>
                <div class="color-options">
                    <div class="color-btn" data-color="aurora" title="极光 (Aurora)" style="background: linear-gradient(135deg, #02aab0, #8a2be2, #00cdac)"></div>
                    <div class="color-btn" data-color="sunset" title="余晖 (Sunset)" style="background: linear-gradient(135deg, #ff512f, #dd2476, #f5af19)"></div>
                    <div class="color-btn" data-color="cyber" title="霓虹 (Cyberpunk)" style="background: linear-gradient(135deg, #00f2fe, #fe5196, #7b2ff7)"></div>
                    <div class="color-btn" data-color="macaron" title="马卡龙 (Macaron)" style="background: linear-gradient(135deg, #a18cd1, #fbc2eb, #ffc3a0)"></div>
                    <div class="color-btn" data-color="spring" title="晨露 (Spring)" style="background: linear-gradient(135deg, #43e97b, #ffd1ff, #38f9d7)"></div>
                    <div class="color-btn" data-color="galaxy" title="星云 (Galaxy)" style="background: linear-gradient(135deg, #13547a, #e8a8c3, #80d0c7)"></div>
                </div>
            </div>
        </div>
        
        <!-- 悬浮设置按钮 -->
        <div class="settings-btn" id="settingsBtn" title="设置">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="3"></circle>
                <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
            </svg>
        </div>
    </div>

    <div class="main-container">
        <!-- 模仿 macOS 窗口红绿灯控件 -->
        <div class="mac-controls">
            <div class="mac-btn close"></div>
            <div class="mac-btn minimize"></div>
            <div class="mac-btn maximize"></div>
        </div>

        <!-- 左侧面板：主目录 -->
        <div class="panel left-panel">
            <!-- <div class="panel-header">书签栏</div> -->
            
            <!-- 固定在顶部的导航项 -->
            <div class="fixed-nav" id="leftFixedArea">
                <div class="app-icon home-action" data-id="HOME" id="homeBtnTop">
                    <div class="icon-img">
                        <svg viewBox="0 0 24 24" fill="currentColor" style="width:100%;height:100%;"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
                    </div>
                    <span class="app-title">首页</span>
                </div>
            </div>

            <!-- 滚动主目录区 -->
            <div class="desktop" id="leftDesktop">
                <!-- 主目录图标将会通过JS动态渲染在这里 -->
            </div>
        </div>

        <!-- 右侧面板：子文件夹内容 -->
        <div class="panel right-panel">
            <div class="panel-header" id="rightHeader">未选择文件夹</div>
            <div class="desktop" id="rightDesktop">
                <!-- 子级内容将会通过JS动态渲染在这里 -->
            </div>

            <!-- 增加：搜索首页容器 -->
            <div class="search-container" id="searchContainer" style="display: none;">
                <div class="sci-fi-clock" id="sciFiClock"></div>
                <div class="search-box-wrapper">
                    <div class="engine-selector" id="engineSelectorBtn">
                        <div class="current-engine">
                            <img src="icons/google.ico" id="currentEngineIcon" alt="Engine">
                            <span id="currentEngineName">Google</span>
                        </div>
                        <div class="custom-dropdown" id="engineDropdown">
                            <div class="dropdown-item active" data-url="https://www.google.com/search?q=" data-icon="icons/google.ico">
                                <img src="icons/google.ico" alt="Google"><span>Google</span>
                            </div>
                            <div class="dropdown-item" data-url="https://www.bing.com/search?q=" data-icon="icons/bing.ico">
                                <img src="icons/bing.ico" alt="Bing"><span>Bing</span>
                            </div>
                            <div class="dropdown-item" data-url="https://www.baidu.com/s?wd=" data-icon="icons/baidu.ico">
                                <img src="icons/baidu.ico" alt="Baidu"><span>Baidu</span>
                            </div>
                            <div class="dropdown-item" data-url="https://duckduckgo.com/?q=" data-icon="icons/duckduckgo.ico">
                                <img src="icons/duckduckgo.ico" alt="DuckDuckGo"><span>DuckDuckGo</span>
                            </div>
                            <div class="dropdown-item" data-url="https://search.bilibili.com/all?keyword=" data-icon="icons/bilibili.ico">
                                <img src="icons/bilibili.ico" alt="Bilibili"><span>Bilibili</span>
                            </div>
                        </div>
                    </div>
                    <input type="text" id="searchInput" class="search-input" placeholder="">
                </div>
                <!-- 快速访问链接区域 -->
                <div id="quickAccessDesktop"></div>
            </div>
        </div>
    </div>

    <!-- 添加新网站的模态框 -->
    <div class="modal" id="addModal">
        <div class="modal-content">
            <h3 id="modalTitle">添加书签</h3>
            <input type="text" id="siteName" placeholder="名称 (如: 百度)">
            <input type="url" id="siteUrl" placeholder="网址 (如: https://www.baidu.com) 当作新建文件夹时留空">
            <div class="modal-buttons">
                <button id="cancelBtn">取消</button>
                <button id="saveBtn">保存</button>
            </div>
        </div>
    </div>

    <!-- 🌟新增：编辑网站/文件夹的模态框 -->
    <div class="modal" id="editModal">
        <div class="modal-content">
            <h3 id="editModalTitle">编辑内容</h3>
            <input type="text" id="editSiteName" placeholder="名称">
            <input type="url" id="editSiteUrl" placeholder="网址 (文件夹留空)">
            <div class="modal-buttons" style="justify-content: space-between;">
                <button id="deleteEditBtn" style="color: #ff3b30; background: rgba(255, 59, 48, 0.1);">删除此项</button>
                <div style="display: flex; gap: 8px;">
                    <button id="cancelEditBtn">取消</button>
                    <button id="saveEditBtn">保存修改</button>
                </div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
